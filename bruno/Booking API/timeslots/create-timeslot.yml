info:
  name: create-timeslot
  type: http
  seq: 1
http:
  method: POST
  url: "{{baseUrl}}/timeslots"
  headers:
    - name: Authorization
      value: Bearer {{adminToken}}
  body:
    type: json
    data: |-
      {
        "date": "2026-05-01",
        "startTime": "10:00",
        "endTime": "11:00"
      }
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
