info:
  name: update-booking-status
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{baseUrl}}/bookings/PUT_BOOKING_ID_HERE/status"
  headers:
    - name: Authorization
      value: Bearer {{adminToken}}
  body:
    type: json
    data: |-
      {
        "status": "approved"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
