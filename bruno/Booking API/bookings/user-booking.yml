info:
  name: user-booking
  type: http
  seq: 5
http:
  method: POST
  url: "{{baseUrl}}/bookings"
  headers:
    - name: Authorization
      value: Bearer {{token}}
  body:
    type: json
    data: |-
      {
        "timeSlotId": "PASTE_SLOT_ID_HERE"
      }
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
