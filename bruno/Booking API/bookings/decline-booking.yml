info:
  name: decline-booking
  type: http
  seq: 4
http:
  method: PATCH
  url: "{{baseUrl}}/bookings/PASTE_BOOKING_ID_HERE/status"
  headers:
    - name: Authorization
      value: Bearer {{adminToken}}
  body:
    type: json
    data: |-
      {
        "status": "declined"
      }
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
